name: test-server
on:
  workflow_call:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Set up dependencies
        working-directory: apps/server
        run: |
            go mod download

      - name: Run unit tests
        working-directory: apps/server
        run: |
            go test -v -cover ./...

  postgres-contract-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mapfox_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Set up Atlas
        uses: ariga/setup-atlas@v0

      - name: Set up dependencies
        working-directory: apps/server
        run: |
            go mod download

      - name: Generate migration schema (dry-run)
        working-directory: apps/server
        run: |
            go run ./cmd/gen-migration/main.go

      - name: Validate migrations are in sync with Atlas
        working-directory: apps/server
        env:
          PGPASSWORD: postgres
        run: |
            # Apply hand-written migrations to test database (source of truth)
            for migration in migrations/*.sql; do
              echo "Applying migration: $migration"
              psql -h localhost -U postgres -d mapfox_test -f "$migration"
            done
            
            # Challenge: compare generated migrations against the hand-written schema in test database
            atlas schema diff --from file://tmps/migrations --to postgres://postgres:postgres@localhost:5432/mapfox_test?sslmode=disable --exit-code

