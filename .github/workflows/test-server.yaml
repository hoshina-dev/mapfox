name: test-server
on:
  workflow_call:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Set up dependencies
        working-directory: apps/server
        run: |
            go mod download

      - name: Run unit tests
        working-directory: apps/server
        run: |
            go test -v -cover ./...
