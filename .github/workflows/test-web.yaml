name: test-web.yaml
on:
  workflow_call:
  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install

      - name: Run Prettier check
        working-directory: apps/web
        run: pnpm format --check
        continue-on-error: false

      - name: Run ESLint check
        working-directory: apps/web
        run: pnpm lint
        continue-on-error: false

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install

      - name: Run Vitest
        working-directory: apps/web
        run: pnpm test:run
        continue-on-error: false
