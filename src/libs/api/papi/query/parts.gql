query GetParts {
  parts {
    id
    name
    partNumber
    description
    images
    manufacturerId
    specifications
    temperatureStage
    manufacturer {
      id
      name
      countryOfOrigin
    }
    categories {
      id
      name
      description
    }
  }
}

query GetPart($id: UUID!) {
  part(id: $id) {
    id
    name
    partNumber
    description
    images
    manufacturerId
    specifications
    temperatureStage
    manufacturer {
      id
      name
      countryOfOrigin
    }
    categories {
      id
      name
      description
    }
  }
}

query GetPartsInventory {
  partsInventory {
    id
    partId
    serialNumber
    isAvailable
    notes
    part {
      id
      name
      partNumber
    }
  }
}

query GetPartsInventoryByPart($partId: UUID!) {
  partsInventoryByPart(partId: $partId) {
    id
    serialNumber
    isAvailable
    notes
  }
}

query GetPartsInventoryItem($id: UUID!) {
  partsInventoryItem(id: $id) {
    id
    partId
    serialNumber
    isAvailable
    notes
    part {
      id
      name
      partNumber
    }
  }
}

mutation CreatePartsInventory($input: CreatePartsInventoryInput!) {
  createPartsInventory(input: $input) {
    id
    partId
    serialNumber
    isAvailable
    notes
  }
}

mutation UpdatePartsInventory($id: UUID!, $input: UpdatePartsInventoryInput!) {
  updatePartsInventory(id: $id, input: $input) {
    id
    partId
    serialNumber
    isAvailable
    notes
  }
}

mutation DeletePartsInventory($id: UUID!) {
  deletePartsInventory(id: $id)
}

mutation CreatePart($input: CreatePartInput!) {
  createPart(input: $input) {
    id
    name
    partNumber
    description
    images
    manufacturerId
    specifications
    temperatureStage
  }
}

mutation UpdatePart($id: UUID!, $input: UpdatePartInput!) {
  updatePart(id: $id, input: $input) {
    id
    name
    partNumber
    description
    images
    manufacturerId
    specifications
    temperatureStage
  }
}

mutation DeletePart($id: UUID!) {
  deletePart(id: $id)
}
